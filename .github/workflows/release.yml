name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Go backend: cross-compile all 3 platforms ──
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            ext: .exe
            target: windows
          - goos: linux
            ext: ''
            target: linux
          - goos: darwin
            ext: ''
            target: macos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - run: |
          cd backend
          GOOS=${{ matrix.goos }} GOARCH=amd64 \
            go build -ldflags "-s -w" -o xjtu-genius${{ matrix.ext }} .
      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: backend/xjtu-genius${{ matrix.ext }}

  # ── Windows: Flutter build + zip + Inno Setup installer ──
  build-windows:
    needs: build-backend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'

      - uses: actions/download-artifact@v4
        with:
          name: backend-windows
          path: backend/

      - name: Build Flutter
        run: cd frontend && flutter build windows --release

      - name: Bundle portable zip
        shell: pwsh
        run: |
          $bundle = "bundle"
          mkdir $bundle
          Copy-Item "frontend\build\windows\x64\runner\Release\*" $bundle -Recurse
          Copy-Item "backend\xjtu-genius.exe" $bundle
          Compress-Archive -Path "$bundle\*" -DestinationPath "XJTU-Course-Genius-windows-x64.zip"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $url = "https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe"
          $out = "$env:RUNNER_TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $out
          & $out /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR="$env:RUNNER_TEMP\InnoSetup"
          echo "$env:RUNNER_TEMP\InnoSetup" >> $env:GITHUB_PATH

      - name: Download Chinese ISL
        shell: pwsh
        run: |
          $langDir = "$env:RUNNER_TEMP\InnoSetup\Languages"
          mkdir $langDir -Force
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile "$langDir\ChineseSimplified.isl"

      - name: Build installer
        shell: bash
        run: iscc scripts/setupconfig.iss

      - uses: actions/upload-artifact@v4
        with:
          name: XJTU-Course-Genius-windows-x64
          path: |
            XJTU-Course-Genius-windows-x64.zip
            dist/XJTU-Course-Genius-Setup-v*.exe

  # ── Linux: Flutter build + .deb ──
  build-linux:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'

      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake pkg-config libgtk-3-dev liblzma-dev

      - uses: actions/download-artifact@v4
        with:
          name: backend-linux
          path: backend/

      - run: chmod +x backend/xjtu-genius

      - name: Build Flutter
        run: cd frontend && flutter build linux --release

      - name: Package .deb
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          INSTALL_DIR="pkg/opt/xjtu-course-genius"
          mkdir -p "$INSTALL_DIR" pkg/DEBIAN

          cp -r frontend/build/linux/x64/release/bundle/* "$INSTALL_DIR/"
          cp backend/xjtu-genius "$INSTALL_DIR/"
          chmod +x "$INSTALL_DIR/xjtu_course_genius" "$INSTALL_DIR/xjtu-genius"

          # Desktop entry
          mkdir -p pkg/usr/share/applications pkg/usr/share/icons/hicolor/256x256/apps
          cat > pkg/usr/share/applications/xjtu-course-genius.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=XJTU Course Genius
          Name[zh_CN]=西安交通大学选课助手
          Comment=XJTU Course Selection Tool
          Exec=/opt/xjtu-course-genius/xjtu_course_genius
          Icon=xjtu-course-genius
          Categories=Education;
          Terminal=false
          EOF
          cp assets/logo.png pkg/usr/share/icons/hicolor/256x256/apps/xjtu-course-genius.png

          # Control file
          cat > pkg/DEBIAN/control << EOF
          Package: xjtu-course-genius
          Version: ${VER:-4.0}
          Architecture: amd64
          Maintainer: Hz
          Description: XJTU Course Genius - course selection tool
           Built with Flutter + Go backend.
          Depends: libgtk-3-0
          EOF

          dpkg-deb --build pkg "XJTU-Course-Genius-linux-x64.deb"
          # Also portable tarball
          cd "$INSTALL_DIR" && tar czf "../../../../XJTU-Course-Genius-linux-x64.tar.gz" *

      - uses: actions/upload-artifact@v4
        with:
          name: XJTU-Course-Genius-linux-x64
          path: |
            XJTU-Course-Genius-linux-x64.deb
            XJTU-Course-Genius-linux-x64.tar.gz

  # ── macOS: Flutter build + .dmg ──
  build-macos:
    needs: build-backend
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'

      - uses: actions/download-artifact@v4
        with:
          name: backend-macos
          path: backend/

      - run: chmod +x backend/xjtu-genius

      - name: Build Flutter
        run: cd frontend && flutter build macos --release

      - name: Package .dmg
        run: |
          app="frontend/build/macos/Build/Products/Release/xjtu_course_genius.app"
          cp backend/xjtu-genius "$app/Contents/MacOS/"
          chmod +x "$app/Contents/MacOS/xjtu-genius"

          mkdir dmg
          cp -r "$app" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname "XJTU Course Genius" \
            -srcfolder dmg -ov -format UDZO \
            "XJTU-Course-Genius-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: XJTU-Course-Genius-macos
          path: XJTU-Course-Genius-macos.dmg

  # ── GitHub Release (on tag push) ──
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: XJTU-Course-Genius-*
          path: artifacts/
          merge-multiple: true

      - name: Flatten artifacts
        run: |
          find artifacts -type f -exec mv {} ./ \;
          rm -rf artifacts
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            XJTU-Course-Genius-windows-x64.zip
            **/XJTU-Course-Genius-Setup-v*.exe
            XJTU-Course-Genius-linux-x64.deb
            XJTU-Course-Genius-macos.dmg
          fail_on_unmatched_files: false
          generate_release_notes: true
