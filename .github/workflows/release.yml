name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      windows:
        description: 'Build Windows'
        type: boolean
        default: false
      linux:
        description: 'Build Linux'
        type: boolean
        default: false
      macos:
        description: 'Build macOS'
        type: boolean
        default: false
      release_tag:
        description: 'Update release tag (e.g. v4.3) — leave empty to skip release'
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Go backend: cross-compile only needed platforms ──
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            ext: .exe
            target: windows
            build: ${{ github.event_name == 'push' || github.event.inputs.windows == 'true' || github.event.inputs.windows == 'all' }}
          - goos: linux
            ext: ''
            target: linux
            build: ${{ github.event_name == 'push' || github.event.inputs.linux == 'true' || github.event.inputs.windows == 'all' }}
          - goos: darwin
            ext: ''
            target: macos
            build: ${{ github.event_name == 'push' || github.event.inputs.macos == 'true' || github.event.inputs.windows == 'all' }}
    # Only build backends that are needed
    if: ${{ matrix.build }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - run: |
          cd backend
          GOOS=${{ matrix.goos }} GOARCH=amd64 \
            go build -ldflags "-s -w" -o xjtu-genius${{ matrix.ext }} .
      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: backend/xjtu-genius${{ matrix.ext }}

  # ── Windows ──
  build-windows:
    needs: build-backend
    if: ${{ github.event_name == 'push' || github.event.inputs.windows == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
      - uses: actions/download-artifact@v4
        with: { name: backend-windows, path: backend/ }
      - name: Build Flutter
        run: cd frontend && flutter build windows --release
      - name: Bundle portable zip
        shell: pwsh
        run: |
          $bundle = "bundle"; mkdir $bundle
          Copy-Item "frontend\build\windows\x64\runner\Release\*" $bundle -Recurse
          Copy-Item "backend\xjtu-genius.exe" $bundle
          Compress-Archive -Path "$bundle\*" -DestinationPath "XJTU-Course-Genius-windows-x64.zip"
      - name: Download Chinese ISL
        shell: pwsh
        run: |
          $d = "${env:ProgramFiles(x86)}\Inno Setup 6\Languages"
          Invoke-WebRequest "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile "$d\ChineseSimplified.isl"
      - name: Build installer
        shell: bash
        run: iscc scripts/setupconfig.iss
      - uses: actions/upload-artifact@v4
        with:
          name: XJTU-Course-Genius-windows-x64
          path: |
            XJTU-Course-Genius-windows-x64.zip
            dist/XJTU-Course-Genius-Setup-v*.exe

  # ── Linux ──
  build-linux:
    needs: build-backend
    if: ${{ github.event_name == 'push' || github.event.inputs.linux == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version: '3.44.1' }
      - run: sudo apt-get update -qq && sudo apt-get install -y cmake pkg-config libgtk-3-dev
      - uses: actions/download-artifact@v4
        with: { name: backend-linux, path: backend/ }
      - run: chmod +x backend/xjtu-genius
      - name: Build Flutter
        run: cd frontend && flutter build linux --release
      - name: Package .deb
        run: |
          VER="${{ github.ref_name }}"; VER="${VER#v}"
          [ "$VER" = "refs/heads/main" ] && VER="dev"
          INSTALL_DIR="pkg/opt/xjtu-course-genius"
          mkdir -p "$INSTALL_DIR" pkg/DEBIAN
          cp -r frontend/build/linux/x64/release/bundle/* "$INSTALL_DIR/"
          cp backend/xjtu-genius "$INSTALL_DIR/"
          chmod +x "$INSTALL_DIR/xjtu_course_genius" "$INSTALL_DIR/xjtu-genius"
          mkdir -p pkg/usr/share/applications
          cat > pkg/usr/share/applications/xjtu-course-genius.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=XJTU Course Genius
          Name[zh_CN]=西安交通大学选课助手
          Comment=XJTU Course Selection Tool
          Exec=/opt/xjtu-course-genius/xjtu_course_genius
          Icon=xjtu-course-genius
          Categories=Education;
          Terminal=false
          EOF
          for size in 48 64 128 256; do
            mkdir -p "pkg/usr/share/icons/hicolor/${size}x${size}/apps"
            cp "assets/linux_icons/${size}x${size}/apps/xjtu-course-genius.png" \
               "pkg/usr/share/icons/hicolor/${size}x${size}/apps/xjtu-course-genius.png"
          done
          cat > pkg/DEBIAN/prerm << 'PRERM'
          #!/bin/sh
          pkill -x -f "/opt/xjtu-course-genius/xjtu_course_genius" 2>/dev/null || true
          pkill -x -f "/opt/xjtu-course-genius/xjtu-genius" 2>/dev/null || true
          exit 0
          PRERM
          chmod +x pkg/DEBIAN/prerm
          cat > pkg/DEBIAN/postinst << 'POSTINST'
          #!/bin/sh
          command -v update-desktop-database >/dev/null 2>&1 && update-desktop-database 2>/dev/null || true
          command -v gtk-update-icon-cache >/dev/null 2>&1 && gtk-update-icon-cache /usr/share/icons/hicolor/ 2>/dev/null || true
          exit 0
          POSTINST
          chmod +x pkg/DEBIAN/postinst
          cat > pkg/DEBIAN/control << EOF
          Package: xjtu-course-genius
          Version: ${VER:-4.0}
          Architecture: amd64
          Maintainer: Hz
          Description: XJTU Course Genius - course selection tool
           Built with Flutter + Go backend.
          Depends: libgtk-3-0
          EOF
          dpkg-deb --build pkg "XJTU-Course-Genius-linux-x64.deb"
          cd "$INSTALL_DIR" && tar czf "../../../../XJTU-Course-Genius-linux-x64.tar.gz" *
      - uses: actions/upload-artifact@v4
        with:
          name: XJTU-Course-Genius-linux-x64
          path: |
            XJTU-Course-Genius-linux-x64.deb
            XJTU-Course-Genius-linux-x64.tar.gz

  # ── macOS ──
  build-macos:
    needs: build-backend
    if: ${{ github.event_name == 'push' || github.event.inputs.macos == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version: '3.44.1' }
      - uses: actions/download-artifact@v4
        with: { name: backend-macos, path: backend/ }
      - run: chmod +x backend/xjtu-genius
      - name: Build Flutter
        run: cd frontend && flutter build macos --release
      - name: Package .dmg
        run: |
          app="frontend/build/macos/Build/Products/Release/xjtu_course_genius.app"
          cp backend/xjtu-genius "$app/Contents/MacOS/"
          chmod +x "$app/Contents/MacOS/xjtu-genius"
          mkdir dmg
          cp -r "$app" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname "XJTU Course Genius" -srcfolder dmg -ov -format UDZO "XJTU-Course-Genius-macos.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: XJTU-Course-Genius-macos
          path: XJTU-Course-Genius-macos.dmg

  # ── Release: tag push = full release, dispatch = update existing release ──
  release:
    needs: [build-windows, build-linux, build-macos]
    if: always() && !cancelled() && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: XJTU-Course-Genius-*
          path: artifacts/
          merge-multiple: true

      - name: Collect assets
        run: |
          find artifacts -type f -exec mv {} ./ \;
          rm -rf artifacts
          ls -lh

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: |
            XJTU-Course-Genius-windows-x64.zip
            XJTU-Course-Genius-Setup-v*.exe
            XJTU-Course-Genius-linux-x64.deb
            XJTU-Course-Genius-linux-x64.tar.gz
            XJTU-Course-Genius-macos.dmg
          fail_on_unmatched_files: false
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
