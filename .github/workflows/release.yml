name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Go backend: cross-compile all 3 platforms ──
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [windows, linux, darwin]
        include:
          - goos: windows
            ext: .exe
          - goos: linux
            ext: ''
          - goos: darwin
            ext: ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - run: |
          cd backend
          GOOS=${{ matrix.goos }} GOARCH=amd64 \
            go build -ldflags "-s -w" -o xjtu-genius${{ matrix.ext }} .
      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.goos }}
          path: backend/xjtu-genius${{ matrix.ext }}

  # ── Flutter per-platform + packaging ──
  build-platform:
    needs: build-backend
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            backend-ext: .exe
            artifact: XJTU-Course-Genius-windows-x64
          - os: ubuntu-latest
            target: linux
            backend-ext: ''
            artifact: XJTU-Course-Genius-linux-x64
          - os: macos-latest
            target: macos
            backend-ext: ''
            artifact: XJTU-Course-Genius-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Linux deps
      - if: matrix.target == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake pkg-config libgtk-3-dev liblzma-dev

      # Download pre-built backend
      - uses: actions/download-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: backend/
      - if: matrix.target != 'windows'
        run: chmod +x backend/xjtu-genius

      # Build Flutter
      - run: cd frontend && flutter build ${{ matrix.target }} --release

      # ── Bundle ──
      - name: Bundle Windows
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $rel = "frontend\build\windows\x64\runner\Release"
          $bundle = "bundle"
          mkdir $bundle
          Copy-Item "$rel\*" $bundle -Recurse
          Copy-Item "backend\xjtu-genius.exe" $bundle
          Compress-Archive -Path "$bundle\*" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Bundle Linux (.deb)
        if: matrix.target == 'linux'
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          PKG="xjtu-course-genius_${VER}_amd64"
          INSTALL_DIR="pkg/opt/xjtu-course-genius"
          mkdir -p "$INSTALL_DIR" pkg/DEBIAN

          # Copy Flutter + backend
          cp -r frontend/build/linux/x64/release/bundle/* "$INSTALL_DIR/"
          cp backend/xjtu-genius "$INSTALL_DIR/"
          chmod +x "$INSTALL_DIR/xjtu_course_genius" "$INSTALL_DIR/xjtu-genius"

          # Desktop entry + icon → app launcher
          mkdir -p pkg/usr/share/applications pkg/usr/share/icons/hicolor/256x256/apps
          cat > pkg/usr/share/applications/xjtu-course-genius.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=XJTU Course Genius
          Name[zh_CN]=西安交通大学选课助手
          Comment=XJTU Course Selection Tool
          Exec=/opt/xjtu-course-genius/xjtu_course_genius
          Icon=xjtu-course-genius
          Categories=Education;
          Terminal=false
          DESKTOP
          cp assets/logo.png pkg/usr/share/icons/hicolor/256x256/apps/xjtu-course-genius.png

          # DEBIAN control
          cat > pkg/DEBIAN/control << CTRL
          Package: xjtu-course-genius
          Version: ${VER:-4.0}
          Architecture: amd64
          Maintainer: Hz <hz@example.com>
          Description: XJTU Course Genius - XJTU course selection tool
            Automates course selection for XJTU students.
            Built with Flutter + Go backend.
          Depends: libgtk-3-0
          CTRL

          dpkg-deb --build pkg "${{ matrix.artifact }}.deb"
          # Also create portable tar.gz
          cd "$INSTALL_DIR" && tar czf "../../../../${{ matrix.artifact }}-portable.tar.gz" *

      - name: Bundle macOS (.dmg)
        if: matrix.target == 'macos'
        run: |
          app="frontend/build/macos/Build/Products/Release/xjtu_course_genius.app"
          cp backend/xjtu-genius "$app/Contents/MacOS/"
          chmod +x "$app/Contents/MacOS/xjtu-genius"

          # Create DMG with Applications shortcut
          mkdir dmg
          cp -r "$app" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname "XJTU Course Genius" \
            -srcfolder dmg -ov -format UDZO \
            "${{ matrix.artifact }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  # ── Build Windows installer (Inno Setup) ──
  build-installer:
    needs: build-backend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/download-artifact@v4
        with:
          name: backend-windows
          path: backend/

      - run: cd frontend && flutter build windows --release

      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress
          echo "$env:ProgramFiles\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Build installer
        run: iscc scripts\setupconfig.iss

      - uses: actions/upload-artifact@v4
        with:
          name: XJTU-Course-Genius-Setup
          path: dist\XJTU-Course-Genius-Setup-v*.exe

  # ── GitHub Release (on tag) ──
  release:
    needs: [build-platform, build-installer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: XJTU-Course-Genius-*
          path: artifacts/

      - run: |
          find artifacts -type f -exec cp {} . \;
          ls -la

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            XJTU-Course-Genius-windows-x64.zip
            XJTU-Course-Genius-linux-x64.tar.gz
            XJTU-Course-Genius-macos.dmg
            XJTU-Course-Genius-Setup-v*.exe
          generate_release_notes: true
